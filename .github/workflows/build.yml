name: Check

on:
  push:
    branches: [main]
  pull_request:

jobs:
  check:
    name: check (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]

    steps:
      - name: Checkout repository
        uses: actions/checkout@0c366fd6a839edf440554fa01a7085ccba70ac98

      - name: Setup Zig
        uses: mlugg/setup-zig@d1434d08867e3ee9daa34448df10607b98908d29
        with:
          version: 0.16.0

      - name: Install project dependencies (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            glslang-tools \
            libvulkan-dev \
            libwayland-bin \
            libwayland-dev \
            libxkbcommon-dev \
            spirv-tools \
            wayland-protocols

      - name: Install project dependencies (macOS)
        if: runner.os == 'macOS'
        run: |
          brew install glslang spirv-tools vulkan-loader
          BREW_PREFIX=$(brew --prefix)
          if [ "$BREW_PREFIX" != "/usr/local" ]; then
            sudo mkdir -p /usr/local/include /usr/local/lib
            sudo ln -sf "$BREW_PREFIX/include/vulkan" /usr/local/include/vulkan
            sudo ln -sf "$BREW_PREFIX/include/vk_video" /usr/local/include/vk_video
            for f in "$BREW_PREFIX"/lib/libvulkan*; do
              sudo ln -sf "$f" /usr/local/lib/
            done
          fi

      - name: Install Vulkan SDK (Windows)
        if: runner.os == 'Windows'
        uses: humbletim/setup-vulkan-sdk@c25f41106918cde0bf347e6f201277392b3a9e9d
        with:
          vulkan-query-version: latest
          vulkan-components: Vulkan-Headers, Vulkan-Loader, Glslang, SPIRV-Tools
          vulkan-use-cache: true

      - name: Run build check
        run: zig build check
