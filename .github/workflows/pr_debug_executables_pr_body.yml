name: PR Debug Executables PR Body

on:
  workflow_run:
    workflows:
      - PR Debug Executables
    types:
      - completed

permissions:
  actions: read
  contents: read
  pull-requests: write

jobs:
  update-pr-body:
    name: update PR body with artifacts
    if: ${{ github.event.workflow_run.event == 'pull_request' }}
    runs-on: ubuntu-latest

    steps:
      - name: Update PR artifact section
        uses: actions/github-script@ed597411d8f924073f98dfc5c65a23a2325f34cd
        with:
          script: |
            const run = context.payload.workflow_run;
            const pullRequests = run.pull_requests ?? [];
            if (pullRequests.length === 0) {
              core.info("No pull request associated with this workflow run.");
              return;
            }

            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const serverUrl = process.env.GITHUB_SERVER_URL ?? "https://github.com";
            const startMarker = "<!-- pr-debug-executables:start -->";
            const endMarker = "<!-- pr-debug-executables:end -->";
            const runUrl = `${serverUrl}/${owner}/${repo}/actions/runs/${run.id}`;
            const shortSha = run.head_sha.slice(0, 7);

            const escapeRegExp = (value) => value.replace(/[.*+?^${}()|[\]\\]/g, "\\$&");
            const sectionPattern = new RegExp(
              `${escapeRegExp(startMarker)}[\\s\\S]*?${escapeRegExp(endMarker)}`,
              "m",
            );

            const artifactsResponse = await github.rest.actions.listWorkflowRunArtifacts({
              owner,
              repo,
              run_id: run.id,
              per_page: 100,
            });
            const artifacts = artifactsResponse.data.artifacts
              .filter((artifact) => !artifact.expired)
              .sort((left, right) => left.name.localeCompare(right.name));

            for (const pullRequest of pullRequests) {
              const currentPullRequest = await github.rest.pulls.get({
                owner,
                repo,
                pull_number: pullRequest.number,
              });

              if (currentPullRequest.data.head.sha !== run.head_sha) {
                core.info(
                  `Skipping PR #${pullRequest.number} because ${run.head_sha} is no longer the latest head SHA.`,
                );
                continue;
              }

              let bodySectionLines;
              if (run.conclusion === "success" && artifacts.length > 0) {
                bodySectionLines = [
                  "## Debug executables",
                  `Latest commit: \`${shortSha}\``,
                  `Workflow run: [#${run.run_number}](${runUrl})`,
                  "",
                  ...artifacts.map((artifact) =>
                    `- [${artifact.name}](${serverUrl}/${owner}/${repo}/actions/runs/${run.id}/artifacts/${artifact.id})`,
                  ),
                  "",
                  "Each artifact contains a `.tar.gz` archive so the executable bit survives download.",
                ];
              } else {
                bodySectionLines = [
                  "## Debug executables",
                  `Latest commit: \`${shortSha}\``,
                  `Artifact build status: \`${run.conclusion ?? "unknown"}\``,
                  `Workflow run: [#${run.run_number}](${runUrl})`,
                  "",
                  "No fresh executable artifacts were published for this commit.",
                ];
              }

              const wrappedSection = [
                startMarker,
                ...bodySectionLines,
                endMarker,
              ].join("\n");

              const currentBody = currentPullRequest.data.body ?? "";
              const nextBody = sectionPattern.test(currentBody)
                ? currentBody.replace(sectionPattern, wrappedSection)
                : [currentBody.trimEnd(), wrappedSection].filter(Boolean).join("\n\n");

              if (nextBody === currentBody) {
                core.info(`PR #${pullRequest.number} body already up to date.`);
                continue;
              }

              await github.rest.pulls.update({
                owner,
                repo,
                pull_number: pullRequest.number,
                body: nextBody,
              });
              core.info(`Updated PR #${pullRequest.number} body.`);
            }
